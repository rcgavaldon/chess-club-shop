<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Cards — Chess Club Shop</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{ --ink:#1d2233; --navy:#242b47; --gold:#d9a441; --gold-dark:#b8862e; --line:#c9c2b0; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:Georgia,serif; background:#e9e5d8; color:var(--ink);}

  .toolbar{background:var(--navy); color:#f6f3ea; padding:12px 16px; display:flex; align-items:center; gap:12px;
    flex-wrap:wrap; position:sticky; top:0; z-index:10;}
  .toolbar h1{font-size:16px; margin-right:auto;}
  .toolbar label{font-size:13px; font-family:'Consolas',monospace;}
  .toolbar input{width:60px; padding:5px 8px; border-radius:6px; border:none; font-size:14px;}
  .toolbar button{background:var(--gold); color:var(--navy); border:none; border-radius:8px; padding:8px 16px;
    font-family:'Consolas',monospace; font-weight:bold; font-size:13px; cursor:pointer;}
  .toolbar button.ghost{background:none; border:1px solid rgba(255,255,255,.4); color:#f6f3ea;}
  .hint{max-width:7.5in; margin:12px auto 0; font-size:13px; color:#6b7080; padding:0 10px;}

  .sheet{width:7in; margin:14px auto; background:#fff; padding:0; display:grid;
    grid-template-columns:3.5in 3.5in; box-shadow:0 2px 10px rgba(0,0,0,.15);}
  .card{width:3.5in; height:2in; border:1px dashed var(--line); padding:.14in .16in;
    display:flex; gap:.12in; overflow:hidden; page-break-inside:avoid;}
  .fields{flex:1; display:flex; flex-direction:column; font-size:9.5pt;}
  .brand{font-family:'Consolas',monospace; font-size:7.5pt; letter-spacing:1px; color:var(--gold-dark);
    text-transform:uppercase; margin-bottom:.05in;}
  .fl{display:flex; align-items:baseline; gap:5px; flex:1;}
  .fl .lab{font-size:8pt; color:#555; white-space:nowrap; font-family:'Consolas',monospace;}
  .fl .line{flex:1; border-bottom:1px solid #999;}
  .qrside{width:1in; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.05in;}
  .qr{width:.85in; height:.85in;}
  .qr img, .qr canvas{width:100%!important; height:100%!important;}
  .tid{font-family:'Consolas',monospace; font-weight:bold; font-size:10pt; letter-spacing:1px;}
  .knight{font-size:9pt; color:var(--gold-dark);}

  @media print{
    .toolbar, .hint{display:none;}
    body{background:#fff;}
    .sheet{margin:0; box-shadow:none;}
    @page{size:letter portrait; margin:0.5in;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>&#9822; Order Card Sheets</h1>
  <label>Sheets: <input type="number" id="nSheets" value="1" min="1" max="10"></label>
  <button class="ghost" onclick="generate()">&#8635; New IDs</button>
  <button onclick="window.print()">&#128424; Print</button>
</div>
<p class="hint">Each card has a fresh unique ticket #. Fill it out with the kid, then scan the QR with your phone —
it opens the admin page with that ticket # pre-loaded. Print more sheets any time; IDs are random enough to never collide.</p>

<div id="sheets"></div>

<script src="catalog.js"></script>
<script>
  const ADMIN_URL = SHOP.url.replace(/\/$/, "") + "/admin.html";
  const abc = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  const newId = () => Array.from({length:6}, () => abc[Math.floor(Math.random()*abc.length)]).join("");

  function cardHtml(id){
    return `<div class="card">
      <div class="fields">
        <div class="brand">&#9822; Chess Club Shop — Order</div>
        <div class="fl"><span class="lab">Name</span><span class="line"></span></div>
        <div class="fl"><span class="lab">1st period</span><span class="line"></span></div>
        <div class="fl"><span class="lab">Item #</span><span class="line"></span><span class="lab">$</span><span class="line" style="max-width:.5in"></span></div>
        <div class="fl"><span class="lab">Colors</span><span class="line"></span></div>
        <div class="fl"><span class="lab">Notes</span><span class="line"></span></div>
      </div>
      <div class="qrside">
        <div class="qr" id="qr-${id}"></div>
        <div class="tid">${id}</div>
      </div>
    </div>`;
  }

  function generate(){
    const n = Math.min(10, Math.max(1, parseInt(document.getElementById("nSheets").value) || 1));
    const used = new Set();
    let html = "";
    for (let s = 0; s < n; s++){
      const ids = [];
      while (ids.length < 10){
        const id = newId();
        if (!used.has(id)){ used.add(id); ids.push(id); }
      }
      html += `<div class="sheet">${ids.map(cardHtml).join("")}</div>`;
    }
    document.getElementById("sheets").innerHTML = html;
    used.forEach(id => new QRCode(document.getElementById("qr-" + id), {
      text: `${ADMIN_URL}#new=${id}`,
      width: 120, height: 120,
      correctLevel: QRCode.CorrectLevel.M,
    }));
  }
  generate();
</script>
</body>
</html>
