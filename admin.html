<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Admin — Production Queue</title>
<style>
  :root{
    --ink:#15251b; --paper:#f7f5ec; --card:#fff; --deep:#0e5230; --green:#1a8049; --bright:#28a05e;
    --tint:#e8f1e8; --line:#dde6da; --muted:#5f6f63;
    --quote:#8a5cc4; --pending:#b5822a; --printing:#1c6fb0; --done:#1a8049; --pickedup:#5f6f63; --cancelled:#b5432f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:Georgia,serif; background:var(--paper); color:var(--ink); line-height:1.45; padding-bottom:80px;}
  .mono{font-family:'Consolas','Courier New',monospace;}

  header{background:var(--deep); color:#fff; padding:13px 16px; display:flex; align-items:center; gap:9px;
    position:sticky; top:0; z-index:20; flex-wrap:wrap;}
  header .k{color:#bfe6cd; font-size:22px;}
  header h1{font-size:17px; margin-right:auto;}
  header .sync{font-family:'Consolas',monospace; font-size:11px; padding:3px 8px; border-radius:999px;
    background:rgba(255,255,255,.14); cursor:pointer;}
  header button{background:none; border:1px solid rgba(255,255,255,.3); color:#fff; border-radius:8px;
    padding:6px 10px; font-size:12px; cursor:pointer; font-family:'Consolas',monospace;}

  main{max-width:760px; margin:0 auto; padding:14px;}

  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:12px;}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:11px; padding:11px 12px; text-align:center;
    box-shadow:0 1px 3px rgba(14,82,48,.06);}
  .stat .v{font-size:20px; font-weight:bold; color:var(--deep);}
  .stat .l{font-size:10.5px; color:var(--muted); font-family:'Consolas',monospace; letter-spacing:.5px;}

  .btn{border:none; border-radius:8px; padding:11px 16px; font-size:14px; cursor:pointer;
    font-family:'Consolas',monospace; font-weight:bold; transition:.12s;}
  .btn.green{background:var(--green); color:#fff;} .btn.green:hover{background:var(--bright);}
  .btn.deep{background:var(--deep); color:#fff;}
  .btn.ghost{background:none; border:1px solid var(--line); color:var(--muted);}
  .btn.sm{padding:6px 11px; font-size:12px;}
  .btn:active{transform:translateY(1px);}
  .newbar{display:flex; gap:10px; margin-bottom:14px;} .newbar .btn{flex:1;}

  /* money dashboard */
  .money{background:var(--deep); color:#fff; border-radius:12px; padding:14px 16px; margin-bottom:14px;}
  .money h3{font-size:13px; font-family:'Consolas',monospace; letter-spacing:1px; opacity:.85; margin-bottom:10px;}
  .mgrid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px 16px;}
  .m{display:flex; flex-direction:column;}
  .m .v{font-size:22px; font-weight:bold;} .m .v.hero{color:#bfe6cd;}
  .m .l{font-size:11px; font-family:'Consolas',monospace; opacity:.8;}
  .money .foot{margin-top:10px; font-size:11.5px; opacity:.8; font-family:'Consolas',monospace;}

  .tabs{display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; -webkit-overflow-scrolling:touch;}
  .tab{flex:0 0 auto; background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:7px 14px; font-size:13px; cursor:pointer; font-family:'Consolas',monospace; white-space:nowrap;}
  .tab.active{background:var(--deep); color:#fff; border-color:var(--deep);}
  .tab .n{opacity:.7;}

  .ticket{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px;
    border-left:5px solid var(--muted); box-shadow:0 1px 3px rgba(14,82,48,.06);}
  .ticket[data-s="quote"]{border-left-color:var(--quote);}
  .ticket[data-s="pending"]{border-left-color:var(--pending);}
  .ticket[data-s="printing"]{border-left-color:var(--printing);}
  .ticket[data-s="done"]{border-left-color:var(--done);}
  .ticket[data-s="pickedup"]{border-left-color:var(--pickedup); opacity:.75;}
  .ticket[data-s="cancelled"]{border-left-color:var(--cancelled); opacity:.6;}
  .trow{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .tid{font-family:'Consolas',monospace; font-weight:bold; font-size:13px; background:var(--paper);
    border:1px solid var(--line); border-radius:6px; padding:2px 7px;}
  .tname{font-weight:bold; font-size:15px;}
  .src{font-family:'Consolas',monospace; font-size:10px; color:var(--quote); border:1px solid var(--quote);
    border-radius:5px; padding:1px 5px;}
  .tstatus{margin-left:auto; font-family:'Consolas',monospace; font-size:11px; text-transform:uppercase; letter-spacing:1px;}
  .tmeta{font-size:13px; color:var(--muted); margin-top:4px;} .tmeta b{color:var(--ink);}
  .tmeta a{color:var(--green); word-break:break-all;}
  .eta{font-size:12px; font-family:'Consolas',monospace; color:var(--deep); margin-top:4px;}
  .tbtns{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:16px;}
  .panel h2{font-size:17px; margin-bottom:4px; color:var(--deep);}
  .panel label{display:block; font-size:12px; font-family:'Consolas',monospace; color:var(--muted); margin:12px 0 4px;}
  .panel input, .panel select, .panel textarea{width:100%; padding:10px 12px; border:1px solid var(--line);
    border-radius:8px; font-family:Georgia,serif; font-size:15px; background:var(--paper);}
  .panel input:focus, .panel select:focus, .panel textarea:focus{outline:none; border-color:var(--green); background:#fff;}
  .panel textarea{min-height:60px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .colorpick{display:flex; flex-wrap:wrap; gap:8px; margin-top:4px;}
  .cchip{display:flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:999px;
    padding:5px 12px 5px 7px; font-size:13px; cursor:pointer; background:var(--paper); user-select:none;}
  .cchip .dot{width:16px; height:16px; border-radius:50%; border:1px solid rgba(0,0,0,.15);}
  .cchip.on{border-color:var(--green); background:var(--tint); font-weight:bold;}
  .hidden{display:none;}
  .scanning{background:var(--gold); color:#fff; border-radius:10px; padding:12px 16px; margin-bottom:14px;
    font-family:'Consolas',monospace; font-weight:bold; text-align:center; animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--deep); color:#fff;
    padding:10px 20px; border-radius:999px; font-size:14px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:50;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <span class="k">&#9822;</span><h1>Shop Admin</h1>
  <span class="sync" id="sync" onclick="Store.sync()">…</span>
  <button onclick="toggleMoney()">&#128176; Money</button>
  <button onclick="toggleSettings()">&#9881;</button>
  <button onclick="exportData()">Export</button>
</header>

<main>
  <!-- money dashboard -->
  <div class="money hidden" id="money">
    <h3>&#128176; EARNINGS</h3>
    <div class="mgrid">
      <div class="m"><span class="v hero" id="mEarned">$0</span><span class="l">collected (picked up)</span></div>
      <div class="m"><span class="v" id="mPerHr">$0/hr</span><span class="l">profitability</span></div>
      <div class="m"><span class="v" id="mHours">0h</span><span class="l">print-hours sold</span></div>
      <div class="m"><span class="v" id="mWeek">$0</span><span class="l">this week</span></div>
    </div>
    <div class="foot" id="mPipe"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="stJobs">0</div><div class="l">IN QUEUE</div></div>
    <div class="stat"><div class="v" id="stHours">0h</div><div class="l">PRINT TIME</div></div>
    <div class="stat"><div class="v" id="stClear">—</div><div class="l">QUEUE CLEARS</div></div>
  </div>

  <div class="newbar">
    <button class="btn green" onclick="openForm()">+ New Ticket</button>
    <button class="btn gold" onclick="pickCard(null)">&#128247; Scan Card</button>
    <button class="btn deep" onclick="location.href='print.html'">&#128424; Print Pack</button>
  </div>
  <input type="file" accept="image/*" capture="environment" id="cardFile" style="display:none">
  <div class="scanning hidden" id="scanning">📷 Reading the card…</div>

  <!-- settings -->
  <div class="panel hidden" id="settings">
    <h2>&#9881; Settings</h2>
    <p style="font-size:13px;color:var(--muted)">Capacity drives every ETA. Admin password unlocks the Sheet sync.</p>
    <div class="row2">
      <div><label>Print minutes / school night</label><input type="number" id="setWeekday" min="0"></div>
      <div><label>Print minutes / weekend day</label><input type="number" id="setWeekend" min="0"></div>
    </div>
    <label>Admin password <span id="beHint" style="color:var(--muted)"></span></label>
    <input id="setToken" placeholder="matches ADMIN_TOKEN in Apps Script">
    <label>Claude API key <span style="color:var(--muted)">(for 📷 Scan Card)</span></label>
    <input id="setApiKey" type="password" placeholder="sk-ant-... (stays on this device)">
    <div style="display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;">
      <button class="btn green" onclick="saveSettings()">Save</button>
      <button class="btn ghost" onclick="importData()">Import backup</button>
    </div>
  </div>

  <!-- new / edit ticket -->
  <div class="panel hidden" id="form">
    <h2 id="formTitle">New Ticket</h2>
    <label>Ticket # <span id="idHint" style="color:var(--green)"></span></label>
    <input id="fId" class="mono" placeholder="auto" style="text-transform:uppercase">
    <button class="btn gold sm" style="margin-top:8px" onclick="pickCard(document.getElementById('fId').value.trim())">&#128247; Scan card to autofill</button>
    <div class="row2">
      <div><label>Name</label><input id="fName" placeholder="First name + last initial"></div>
      <div><label>1st period class</label><input id="fPeriod" placeholder="Teacher / room"></div>
    </div>
    <label>Item</label>
    <select id="fItem" onchange="itemChanged()"></select>
    <div class="row2">
      <div><label>Price ($)</label><input type="number" id="fPrice" min="0" step="1"></div>
      <div><label>Print minutes (sliced)</label><input type="number" id="fMinutes" min="1"></div>
    </div>
    <label>Colors</label>
    <div class="colorpick" id="fColors"></div>
    <label>Link / notes (custom jobs: the MakerWorld link)</label>
    <textarea id="fNotes"></textarea>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button class="btn green" onclick="saveTicket()">Save Ticket</button>
      <button class="btn ghost" onclick="closeForm()">Cancel</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="list"></div>
</main>

<div class="toast" id="toast"></div>

<script src="catalog.js"></script>
<script src="store.js"></script>
<script>
  const $ = s => document.querySelector(s);
  const NEXT = {pending:"printing", printing:"done", done:"pickedup"};
  const NEXT_LABEL = {pending:"&#9654; Start Printing", printing:"&#10003; Mark Done", done:"&#128230; Picked Up + Paid"};
  let activeTab = "queue", editingId = null;

  // ---------- ETA engine ----------
  function computeEtas(){
    const queue = Store.getTickets().filter(t => t.status==="pending" || t.status==="printing")
      .sort((a,b) => a.createdAt - b.createdAt);
    const s = Store.getSettings();
    const cap = d => (d.getDay()===0 || d.getDay()===6) ? s.weekendMin : s.weekdayMin;
    const etas = {};
    let day = new Date(); day.setHours(0,0,0,0);
    let left = cap(day), guard = 0;
    for (const t of queue){
      let mins = t.minutes || 60;
      while (mins > 0 && guard < 3650){
        if (left >= mins){ left -= mins; mins = 0; }
        else { mins -= left; day = new Date(day.getTime()+864e5); left = cap(day); guard++; }
      }
      etas[t.id] = new Date(day);
    }
    return {etas, clearDate: queue.length ? new Date(day) : null, queue};
  }
  const fmtDay = d => d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const linkify = s => esc(s).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');

  // ---------- render ----------
  function render(){
    const all = Store.getTickets();
    const {etas, clearDate, queue} = computeEtas();
    const totalMin = queue.reduce((s,t)=>s+(t.minutes||60),0);
    $("#stJobs").textContent = queue.length;
    $("#stHours").textContent = (totalMin/60).toFixed(1)+"h";
    $("#stClear").textContent = clearDate ? fmtDay(clearDate) : "—";

    // money
    const paid = all.filter(t=>t.status==="pickedup");
    const earned = paid.reduce((s,t)=>s+(+t.price||0),0);
    const hours = paid.reduce((s,t)=>s+(+t.minutes||0),0)/60;
    const weekAgo = Date.now()-7*864e5;
    const week = paid.filter(t=>(t.updatedAt||0)>=weekAgo).reduce((s,t)=>s+(+t.price||0),0);
    const pipe = all.filter(t=>["pending","printing","done"].includes(t.status)).reduce((s,t)=>s+(+t.price||0),0);
    $("#mEarned").textContent = "$"+earned.toFixed(0);
    $("#mHours").textContent = hours.toFixed(1)+"h";
    $("#mPerHr").textContent = hours>0 ? "$"+(earned/hours).toFixed(2)+"/hr" : "—";
    $("#mWeek").textContent = "$"+week.toFixed(0);
    $("#mPipe").textContent = `In the pipeline (not yet collected): $${pipe.toFixed(0)} across ${all.filter(t=>["pending","printing","done"].includes(t.status)).length} jobs`;

    // tabs
    const count = f => all.filter(f).length;
    const tabs = [
      {k:"quote", label:"Quotes", n:count(t=>t.status==="quote")},
      {k:"queue", label:"Queue", n:queue.length},
      {k:"done", label:"Ready", n:count(t=>t.status==="done")},
      {k:"pickedup", label:"Delivered", n:count(t=>t.status==="pickedup")},
      {k:"cancelled", label:"Cancelled", n:count(t=>t.status==="cancelled")},
      {k:"all", label:"All", n:all.length},
    ];
    $("#tabs").innerHTML = tabs.map(t =>
      `<div class="tab ${activeTab===t.k?"active":""}" onclick="setTab('${t.k}')">${t.label} <span class="n">${t.n}</span></div>`).join("");

    let shown = all.slice().sort((a,b)=>b.createdAt-a.createdAt);
    if (activeTab==="queue") shown = shown.filter(t=>t.status==="pending"||t.status==="printing").sort((a,b)=>a.createdAt-b.createdAt);
    else if (activeTab!=="all") shown = shown.filter(t=>t.status===activeTab);

    $("#list").innerHTML = shown.map(t => {
      const eta = etas[t.id] ? `<div class="eta">est. ready ${fmtDay(etas[t.id])}</div>` : "";
      let btns = "";
      if (t.status==="quote"){
        btns = `<button class="btn green sm" onclick="openForm('${t.id}')">Accept &amp; price</button>
                <button class="btn ghost sm" onclick="cancelTicket('${t.id}')">Decline</button>`;
      } else {
        const adv = NEXT[t.status] ? `<button class="btn green sm" onclick="advance('${t.id}')">${NEXT_LABEL[t.status]}</button>` : "";
        const cancel = (t.status==="pending"||t.status==="printing") ? `<button class="btn ghost sm" onclick="cancelTicket('${t.id}')">Cancel</button>` : "";
        btns = adv+cancel+`<button class="btn ghost sm" onclick="openForm('${t.id}')">Edit</button>`;
      }
      const src = t.source==="student" ? `<span class="src">student</span>` : "";
      const priceStr = t.status==="quote" ? "needs quote" : "$"+t.price;
      return `<div class="ticket" data-s="${t.status}">
        <div class="trow"><span class="tid">${t.id}</span><span class="tname">${esc(t.name)||"(no name)"}</span>${src}
          <span class="tstatus" style="color:var(--${t.status})">${t.status}</span></div>
        <div class="tmeta"><b>${esc(t.itemLabel)||"—"}</b> · ${priceStr} · ${t.minutes||"?"} min · ${t.colors.join(" + ")||"no colors"}${t.period?` · 1st per: ${esc(t.period)}`:""}</div>
        ${t.notes ? `<div class="tmeta">${linkify(t.notes)}</div>` : ""}${eta}
        <div class="tbtns">${btns}</div>
      </div>`;
    }).join("") || `<p style="text-align:center;color:var(--muted);padding:30px 0">Nothing here.</p>`;

    renderSync();
  }
  function renderSync(){
    const s = Store.status(), el = $("#sync");
    if (!s.backend){ el.textContent = "local only"; el.title="No Sheet connected — see apps-script/DEPLOY.md"; return; }
    if (s.lastError){ el.textContent = "⚠ offline"+(s.pending?` (${s.pending})`:""); el.title=s.lastError; }
    else if (s.pending){ el.textContent = `⚠ ${s.pending} to sync`; }
    else { el.textContent = "☁ synced"; el.title = s.lastSync ? "Last sync "+new Date(s.lastSync).toLocaleTimeString() : ""; }
  }
  function setTab(k){ activeTab=k; render(); }
  function toggleMoney(){ $("#money").classList.toggle("hidden"); }

  // ---------- ticket ops ----------
  function advance(id){
    const t = Store.getTickets().find(t=>t.id===id); if(!t||!NEXT[t.status]) return;
    Store.save(Object.assign({}, t, {status:NEXT[t.status]})); toast(`${id} → ${NEXT[t.status]}`);
  }
  function cancelTicket(id){
    const t = Store.getTickets().find(t=>t.id===id); if(!t) return;
    if(!confirm(`${t.status==="quote"?"Decline":"Cancel"} ticket ${id}?`)) return;
    Store.save(Object.assign({}, t, {status:"cancelled"}));
  }

  // ---------- form ----------
  function buildItemSelect(){
    $("#fItem").innerHTML = ITEMS.map(i=>`<option value="${i.code}">${i.code} — ${i.name} ($${i.tier})</option>`).join("")
      + `<option value="CUSTOM">CUSTOM — quote job</option>`;
  }
  function itemChanged(){
    const it = ITEMS.find(i=>i.code===$("#fItem").value);
    if(it){ $("#fPrice").value=it.tier; $("#fMinutes").value=it.minutes; }
  }
  function buildColorPick(sel){
    $("#fColors").innerHTML = COLORS.filter(c=>c.inStock||(sel||[]).includes(c.name)).map(c=>
      `<span class="cchip ${(sel||[]).includes(c.name)?"on":""}" data-c="${c.name}" onclick="this.classList.toggle('on')">
        <span class="dot" style="background:${c.hex}"></span>${c.name}</span>`).join("");
  }
  function openForm(id, presetId){
    editingId = id || null;
    const t = id ? Store.getTickets().find(t=>t.id===id) : null;
    $("#formTitle").textContent = t ? (t.status==="quote"?`Quote ${t.id} → accept`:`Edit ${t.id}`) : "New Ticket";
    $("#idHint").textContent = presetId ? "(from scanned card)" : "";
    $("#fId").value = t ? t.id : (presetId||""); $("#fId").disabled = !!t;
    $("#fName").value = t ? t.name : "";
    $("#fPeriod").value = t ? t.period : "";
    buildItemSelect();
    $("#fItem").value = t ? (ITEMS.some(i=>i.code===t.itemCode)?t.itemCode:"CUSTOM") : ITEMS[0].code;
    $("#fPrice").value = t ? t.price : ITEMS[0].tier;
    $("#fMinutes").value = t ? t.minutes : ITEMS[0].minutes;
    buildColorPick(t ? t.colors : []);
    $("#fNotes").value = t ? t.notes : "";
    $("#form").classList.remove("hidden"); $("#form").scrollIntoView({behavior:"smooth"});
    if(!t) $("#fName").focus();
  }
  function closeForm(){ $("#form").classList.add("hidden"); editingId=null; history.replaceState(null,"",location.pathname); }
  function saveTicket(){
    const idRaw = $("#fId").value.trim().toUpperCase();
    const it = ITEMS.find(i=>i.code===$("#fItem").value);
    const colors = [...document.querySelectorAll("#fColors .cchip.on")].map(e=>e.dataset.c);
    const existing = editingId ? Store.getTickets().find(t=>t.id===editingId) : null;
    const data = {
      id: existing ? existing.id : (idRaw || Store.newId()),
      name:$("#fName").value.trim(), period:$("#fPeriod").value.trim(),
      itemCode:$("#fItem").value, itemLabel: it ? `${it.code} ${it.name}` : "CUSTOM",
      price:parseFloat($("#fPrice").value)||0, minutes:parseInt($("#fMinutes").value)||60,
      colors, notes:$("#fNotes").value.trim(),
      // accepting a quote (or brand new) → pending; otherwise keep current status
      status: existing ? (existing.status==="quote" ? "pending" : existing.status) : "pending",
      source: existing ? existing.source : "",
      createdAt: existing ? existing.createdAt : Date.now(),
    };
    if(!existing && Store.getTickets().some(t=>t.id===data.id)) return toast(`Ticket ${data.id} already exists!`);
    Store.save(data); closeForm(); toast("Saved &#10003;");
  }

  // ---------- settings / backup ----------
  function toggleSettings(){
    const s = Store.getSettings();
    $("#setWeekday").value = s.weekdayMin; $("#setWeekend").value = s.weekendMin;
    $("#setToken").value = Store.token();
    $("#setApiKey").value = apiKey();
    $("#beHint").textContent = Store.hasBackend() ? "" : "(no Sheet connected yet)";
    $("#settings").classList.toggle("hidden");
  }
  function saveSettings(){
    Store.saveSettings({weekdayMin:parseInt($("#setWeekday").value)||0, weekendMin:parseInt($("#setWeekend").value)||0});
    Store.setToken($("#setToken").value.trim());
    localStorage.setItem("ccshop_api_key", $("#setApiKey").value.trim());
    $("#settings").classList.add("hidden"); Store.sync(); toast("Settings saved");
  }

  // ---------- scan card (Claude vision OCR) ----------
  const apiKey = () => localStorage.getItem("ccshop_api_key") || "";
  const OCR_PROMPT = `You are reading ONE handwritten 3D-print order card from a school print shop.
Printed labels the student wrote next to: Name (first name + last initial); "1st period" (their first-period class/teacher/room); "Item #" (a product code shaped like <digit>-<letter>, e.g. 2-A, 3-B, 5-A); "$" (a price); Colors (one or more filament colors such as Black, White, Gray, Red, Blue, Green, Gold); Notes (anything extra — for a Pokéball item this may name a "kind" like Great Ball / Ultra Ball).
The card also has a PRINTED ticket code: 6 characters, uppercase letters + digits (no O, 0, 1, or I).
Read the handwriting as best you can. Return each field; use an empty string (or empty array for colors) when a field is blank. Put any Pokéball/variant "kind" in the kind field and everything else free-form in notes.`;

  const OCR_SCHEMA = { type:"object", additionalProperties:false,
    required:["ticketId","name","period","itemCode","price","colors","kind","notes"],
    properties:{
      ticketId:{type:"string"}, name:{type:"string"}, period:{type:"string"},
      itemCode:{type:"string"}, price:{type:"number"},
      colors:{type:"array", items:{type:"string"}}, kind:{type:"string"}, notes:{type:"string"} } };

  function fileToDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }
  async function fileToImage(file){                       // downscale phone photos before upload
    const url = await fileToDataURL(file);
    const img = await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url; });
    const max=1600, scale=Math.min(1, max/Math.max(img.width,img.height));
    const cw=Math.round(img.width*scale), ch=Math.round(img.height*scale);
    const c=document.createElement("canvas"); c.width=cw; c.height=ch;
    c.getContext("2d").drawImage(img,0,0,cw,ch);
    return { b64: c.toDataURL("image/jpeg",0.85).split(",")[1], mediaType:"image/jpeg" };
  }
  async function ocrCard(b64, mediaType, key){
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "x-api-key":key, "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true", "content-type":"application/json" },
      body: JSON.stringify({
        model:"claude-opus-4-8", max_tokens:1024,
        output_config:{ format:{ type:"json_schema", schema:OCR_SCHEMA } },
        messages:[{ role:"user", content:[
          { type:"image", source:{ type:"base64", media_type:mediaType, data:b64 } },
          { type:"text", text:OCR_PROMPT } ] }],
      }),
    });
    if(!res.ok){ throw new Error("API "+res.status+" "+(await res.text()).slice(0,120)); }
    const data = await res.json();
    const txt = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    return JSON.parse(txt);
  }
  const canonColors = arr => (arr||[]).map(c => {
    const m = COLORS.find(x=>x.name.toLowerCase()===String(c).toLowerCase())
          || COLORS.find(x=>String(c).toLowerCase().includes(x.name.toLowerCase()));
    return m ? m.name : c;
  });

  let _scanPreset = null;
  function pickCard(preset){
    if(!apiKey()){ toast("Add your Claude API key in ⚙ Settings first"); if($("#settings").classList.contains("hidden")) toggleSettings(); return; }
    _scanPreset = preset || null; $("#cardFile").value = ""; $("#cardFile").click();
  }
  async function scanCard(file, preset){
    let img;
    try { img = await fileToImage(file); } catch { return toast("Couldn't read that photo"); }
    $("#scanning").classList.remove("hidden");
    let d;
    try { d = await ocrCard(img.b64, img.mediaType, apiKey()); }
    catch(e){ console.error(e); $("#scanning").classList.add("hidden"); return toast("Scan failed: "+String(e.message||e).slice(0,60)); }
    $("#scanning").classList.add("hidden");
    const id = preset || (/^[A-Z0-9]{6}$/.test((d.ticketId||"").toUpperCase()) ? d.ticketId.toUpperCase() : "");
    openForm(null, id);
    $("#fName").value = d.name || "";
    $("#fPeriod").value = d.period || "";
    const code = (d.itemCode||"").toUpperCase().replace(/\s/g,"");
    if(ITEMS.some(i=>i.code===code)){ $("#fItem").value = code; itemChanged(); }
    else { $("#fItem").value = "CUSTOM"; }
    if(+d.price) $("#fPrice").value = +d.price;
    buildColorPick(canonColors(d.colors));
    $("#fNotes").value = [d.kind?("Kind: "+d.kind):"", d.notes||""].filter(Boolean).join(" · ");
    toast("Check the details, then Save &#10003;");
  }
  document.getElementById("cardFile").addEventListener("change", e => {
    const f = e.target.files && e.target.files[0]; if(f) scanCard(f, _scanPreset);
  });
  function exportData(){
    const blob = new Blob([JSON.stringify(Store.exportBlob(),null,2)],{type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "chess-club-shop-backup.json"; a.click();
  }
  function importData(){
    const inp = document.createElement("input"); inp.type="file"; inp.accept=".json";
    inp.onchange = () => { const r=new FileReader();
      r.onload = () => { try { const d=JSON.parse(r.result); if(!Array.isArray(d.tickets)) throw 0;
        Store.replaceAll(d.tickets, d.settings); toast("Backup restored"); }
        catch { toast("Bad backup file"); } };
      r.readAsText(inp.files[0]); };
    inp.click();
  }
  function toast(msg){ const t=$("#toast"); t.innerHTML=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }

  // ---------- boot ----------
  Store.onChange(render);
  (function(){
    const m = location.hash.match(/new=([A-Z0-9]+)/i);
    if(m){ const id=m[1].toUpperCase(); const ex=Store.getTickets().find(t=>t.id===id);
      if(ex) openForm(ex.id); else openForm(null, id); }
  })();
  render();
  Store.init();
</script>
</body>
</html>
